<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Photography</title>
  <meta name="description" content="Photo archive and gallery.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #f6f6f6;
      --ink: #111111;
      --muted: #6b6b6b;
      --card: #ffffff;
      --line: #e5e5e5;
      --radius: 14px;
      --accent: #111111;
      --accent-soft: #f2f2f2;
      --sprinkle: #f4c9a8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #fafafa 0%, #f3f3f3 100%);
      color: var(--ink);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(100% - 32px, 1080px);
      margin: 0 auto;
      padding: 40px 0 60px;
    }

    h1 {
      font-family: "IBM Plex Sans", "Helvetica Neue", sans-serif;
      margin: 0 0 12px;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.4rem;
    }

    p { color: var(--muted); margin: 0 0 26px; }

    .panel {
      padding: 20px 22px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--line);
      margin-top: 26px;
    }

    .album {
      padding: 24px;
      border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--line);
    }

    .album-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .album-meta {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .album-nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .album-btn {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 0;
    }

    .album-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .album-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
    }

    .gallery {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .thumbs-swiper {
      width: 120px;
      height: 620px;
      padding-right: 10px;
      overflow: hidden;
    }

    .thumbs-swiper .swiper-slide {
      height: 100px;
      opacity: 0.5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumbs-swiper .swiper-slide-thumb-active {
      opacity: 1;
    }

    .thumbs-swiper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid transparent;
    }

    .thumbs-swiper .swiper-slide-thumb-active img {
      border-color: var(--accent);
    }

    .thumbs-swiper .swiper-scrollbar {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 999px;
      width: 6px;
      right: 2px;
      left: auto;
    }

    .thumbs-swiper .swiper-scrollbar-drag {
      background: rgba(31, 74, 60, 0.5);
      border-radius: 999px;
    }

    .main-swiper {
      width: 100%;
      max-width: 620px;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      justify-self: start;
    }

    .main-swiper .swiper-slide {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-swiper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .main-swiper .swiper-button-prev,
    .main-swiper .swiper-button-next {
      color: var(--ink);
    }

    .main-swiper .swiper-button-prev::after,
    .main-swiper .swiper-button-next::after {
      font-size: 16px;
      font-weight: 700;
    }

    .main-actions {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .action-btn {
      border: 0;
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      border: 1px solid var(--line);
    }

    .action-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .effect-select {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .nav {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 600;
    }

    .sprinkle {
      height: 3px;
      width: 42px;
      background: linear-gradient(90deg, transparent, var(--sprinkle), transparent);
      border-radius: 999px;
      margin: 8px 0 18px;
    }

    @media (max-width: 860px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .thumbs-swiper {
        width: 100%;
        height: 90px;
      }

      .thumbs-swiper .swiper-slide {
        height: 70px;
      }
    }

    @media (max-width: 720px) {
      .album-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>My Photography</h1>
    <p>A simple home for JPG photo sets.</p>
    <div class="sprinkle" aria-hidden="true"></div>

    <section class="album">
      <div class="album-nav" id="album-nav"></div>
      <div class="album-head">
        <div>
          <h2 id="album-title">雪狸</h2>
          <div class="album-meta" id="album-meta">6 photos · folder: <code>photography/jpgs/雪狸</code></div>
        </div>
      </div>

      <div class="gallery">
        <div class="swiper thumbs-swiper">
          <div class="swiper-wrapper" id="thumbs-wrapper"></div>
          <div class="swiper-scrollbar"></div>
        </div>
        <div class="swiper main-swiper" id="main-swiper">
          <div class="swiper-wrapper" id="main-wrapper"></div>
          <div class="main-actions">
            <button class="action-btn" id="autoplay-btn" type="button">Autoplay</button>
            <button class="action-btn" id="fullscreen-btn" type="button">Fullscreen</button>
            <select class="effect-select" id="effect-select" aria-label="Transition effect">
              <option value="slide">Slide</option>
              <option value="fade">Fade</option>
              <option value="coverflow">Coverflow</option>
              <option value="cube">Cube</option>
              <option value="flip">Flip</option>
              <option value="creative">Creative</option>
            </select>
          </div>
          <div class="swiper-button-prev" aria-label="Previous"></div>
          <div class="swiper-button-next" aria-label="Next"></div>
        </div>
      </div>
    </section>

    <div class="panel">
      <h3>JPG folder</h3>
      <p><a href="/photography/jpgs/">Open the JPG directory</a></p>
    </div>

    <div class="nav">
      <a class="btn" href="/">Back to Home</a>
      <a class="btn" href="/codings/">Go to Codings</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    let albums = {};

    const thumbsWrapper = document.getElementById('thumbs-wrapper');
    const mainWrapper = document.getElementById('main-wrapper');
    const albumNav = document.getElementById('album-nav');
    const albumTitle = document.getElementById('album-title');
    const albumMeta = document.getElementById('album-meta');
    let thumbsSwiper = null;
    let mainSwiper = null;
    const autoplayBtn = document.getElementById('autoplay-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const mainSwiperEl = document.getElementById('main-swiper');
    const effectSelect = document.getElementById('effect-select');
    let autoplayWanted = false;
    let activeAlbum = null;

    function buildSlides(folderName, files) {
      thumbsWrapper.innerHTML = '';
      mainWrapper.innerHTML = '';

      files.forEach((file) => {
        const src = `./jpgs/${folderName}/${file}`;
        const alt = file.replace(/\\.[^.]+$/, '');

        const thumbSlide = document.createElement('div');
        thumbSlide.className = 'swiper-slide';
        thumbSlide.innerHTML = `<img src="${src}" alt="${alt}">`;
        thumbsWrapper.appendChild(thumbSlide);

        const mainSlide = document.createElement('div');
        mainSlide.className = 'swiper-slide';
        mainSlide.innerHTML = `<img src="${src}" alt="${alt}">`;
        mainWrapper.appendChild(mainSlide);
      });
    }

    function initSwipers(effect = 'slide') {
      if (thumbsSwiper) thumbsSwiper.destroy(true, true);
      if (mainSwiper) mainSwiper.destroy(true, true);

      thumbsSwiper = new Swiper('.thumbs-swiper', {
        direction: 'vertical',
        slidesPerView: 5,
        spaceBetween: 10,
        watchSlidesProgress: true,
        mousewheel: {
          forceToAxis: true,
          sensitivity: 1
        },
        freeMode: true,
        nested: true,
        scrollbar: {
          el: '.thumbs-swiper .swiper-scrollbar',
          draggable: true
        },
        breakpoints: {
          0: {
            direction: 'horizontal',
            slidesPerView: 4,
            mousewheel: false
          },
          860: {
            direction: 'vertical',
            slidesPerView: 5,
            mousewheel: true
          }
        }
      });

      mainSwiper = new Swiper('.main-swiper', {
        spaceBetween: 10,
        effect,
        creativeEffect: {
          prev: { translate: ['-20%', 0, -1], opacity: 0.5 },
          next: { translate: ['20%', 0, -1], opacity: 0.5 }
        },
        autoplay: {
          delay: 2500,
          disableOnInteraction: false
        },
        navigation: {
          nextEl: '.main-swiper .swiper-button-next',
          prevEl: '.main-swiper .swiper-button-prev'
        },
        thumbs: {
          swiper: thumbsSwiper
        }
      });

      // Start paused by default
      if (autoplayWanted) {
        mainSwiper.autoplay.start();
        autoplayBtn.classList.add('active');
      } else {
        mainSwiper.autoplay.stop();
        autoplayBtn.classList.remove('active');
      }
    }

    function renderAlbum(name) {
      const files = albums[name] || [];
      activeAlbum = name;
      albumTitle.textContent = name;
      albumMeta.innerHTML = `${files.length} photos · folder: <code>photography/jpgs/${name}</code>`;
      buildSlides(name, files);
      initSwipers(effectSelect.value || 'slide');

      [...albumNav.children].forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.album === name);
      });
    }

    async function loadAlbums() {
      try {
        const response = await fetch('./albums.json', { cache: 'no-cache' });
        if (!response.ok) throw new Error('Failed to load albums.json');
        albums = await response.json();
      } catch (error) {
        albumTitle.textContent = 'Albums not loaded';
        albumMeta.textContent = 'Run `node scripts/build-albums.js` to refresh albums.json.';
        return;
      }

      albumNav.innerHTML = '';
      Object.keys(albums).forEach((name) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'album-btn';
        button.dataset.album = name;

        const files = albums[name] || [];
        const cover = files[0] ? `./jpgs/${name}/${files[0]}` : '';
        button.innerHTML = cover ? `<img src="${cover}" alt="${name}">` : name;

        button.addEventListener('click', () => {
          renderAlbum(name);
        });

        albumNav.appendChild(button);
      });

      const defaultAlbum = Object.keys(albums)[0];
      if (defaultAlbum) renderAlbum(defaultAlbum);
    }

    loadAlbums();

    autoplayBtn.addEventListener('click', () => {
      if (!mainSwiper) return;
      if (mainSwiper.autoplay.running) {
        mainSwiper.autoplay.stop();
        autoplayBtn.classList.remove('active');
        autoplayWanted = false;
      } else {
        mainSwiper.autoplay.start();
        autoplayBtn.classList.add('active');
        autoplayWanted = true;
      }
    });

    fullscreenBtn.addEventListener('click', async () => {
      if (!document.fullscreenElement) {
        await mainSwiperEl.requestFullscreen();
        fullscreenBtn.classList.add('active');
      } else {
        await document.exitFullscreen();
        fullscreenBtn.classList.remove('active');
      }
    });

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        fullscreenBtn.classList.remove('active');
      }
    });

    effectSelect.addEventListener('change', () => {
      const currentIndex = mainSwiper ? mainSwiper.activeIndex : 0;
      initSwipers(effectSelect.value);
      if (mainSwiper) {
        mainSwiper.slideTo(currentIndex, 0);
        if (autoplayWanted) mainSwiper.autoplay.start();
      }
    });
  </script>
</body>
</html>
