<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JPG Folder</title>
  <style>
    body {
      margin: 0;
      font-family: "Space Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f6f2ea;
      color: #1c1b16;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 26px 28px;
      border: 1px solid rgba(28, 27, 22, 0.1);
      box-shadow: 0 12px 28px rgba(28, 27, 22, 0.08);
      max-width: 520px;
    }

    a { color: inherit; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>JPG Drop Zone</h1>
    <p>Add your JPG files here. Then revisit <a href="/photography/">My Photography</a> to keep the gallery organized.</p>
  </div>
</body>
</html>
