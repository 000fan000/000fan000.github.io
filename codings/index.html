<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Codings</title>
  <meta name="description" content="Coding projects and experiments.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #fafafa;
      --ink: #111111;
      --muted: #6b6b6b;
      --card: #ffffff;
      --line: #e5e5e5;
      --radius: 14px;
      --sprinkle: #f4c9a8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--ink);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(100% - 32px, 960px);
      margin: 0 auto;
      padding: 40px 0 60px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
    }

    .sprinkle {
      height: 3px;
      width: 42px;
      background: linear-gradient(90deg, transparent, var(--sprinkle), transparent);
      border-radius: 999px;
      margin: 12px 0 20px;
    }

    p { color: var(--muted); margin: 0 0 28px; }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 18px 20px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .card strong { font-size: 1.1rem; }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: #f2f2f2;
      color: var(--ink);
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--line);
    }

    .nav {
      margin-top: 30px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>My Codings</h1>
    <div class="sprinkle" aria-hidden="true"></div>
    <p>Projects and experiments with clear documentation.</p>

    <div class="grid">
      <a class="card" href="/codings/read-again.html">
        <div>
          <strong>Read-again</strong>
          <div>AI reading notes assistant page.</div>
        </div>
        <span class="tag">Original landing</span>
      </a>
      <a class="card" href="/codings/fortune-calendar.html">
        <div>
          <strong>Fortune Calendar</strong>
          <div>Daily fortune calendar with gentle prompts.</div>
        </div>
        <span class="tag">Interactive</span>
      </a>
    </div>

    <div class="nav">
      <a class="btn" href="/">Back to Home</a>
      <a class="btn" href="/diary/">Go to Diary</a>
    </div>
  </div>
</body>
</html>
