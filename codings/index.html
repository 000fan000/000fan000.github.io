<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Codings</title>
  <meta name="description" content="Coding projects and experiments.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Grotesk:wght@400;500&display=swap');

    :root {
      --bg: #f4f1ea;
      --ink: #1d1d17;
      --muted: #5b5b4f;
      --card: #ffffff;
      --line: rgba(29, 29, 23, 0.12);
      --radius: 18px;
      --accent: #1f4a3c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f4f1ea 0%, #ebe4d6 100%);
      color: var(--ink);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(100% - 32px, 960px);
      margin: 0 auto;
      padding: 40px 0 60px;
    }

    h1 {
      font-family: "Fraunces", "Georgia", serif;
      margin: 0 0 10px;
      font-size: 2.4rem;
    }

    p { color: var(--muted); margin: 0 0 28px; }

    .grid {
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 20px 22px;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 10px 24px rgba(29, 29, 23, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .card strong { font-size: 1.1rem; }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(31, 74, 60, 0.1);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .nav {
      margin-top: 30px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>My Codings</h1>
    <p>Projects and experiments with clear documentation.</p>

    <div class="grid">
      <a class="card" href="/codings/read-again.html">
        <div>
          <strong>Read-again</strong>
          <div>AI reading notes assistant page.</div>
        </div>
        <span class="tag">Original landing</span>
      </a>
    </div>

    <div class="nav">
      <a class="btn" href="/">Back to Home</a>
      <a class="btn" href="/diary/">Go to Diary</a>
    </div>
  </div>
</body>
</html>
