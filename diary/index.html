<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Diary</title>
  <meta name="description" content="Diary entries written in markdown.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Space+Grotesk:wght@400;500&display=swap');

    :root {
      --bg: #f7f3eb;
      --ink: #1c1c16;
      --muted: #5c5c50;
      --card: #fffdf7;
      --line: rgba(28, 28, 22, 0.12);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f7f3eb 0%, #efe7d9 100%);
      color: var(--ink);
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(100% - 32px, 900px);
      margin: 0 auto;
      padding: 40px 0 60px;
    }

    h1 {
      font-family: "Fraunces", "Georgia", serif;
      margin: 0 0 10px;
      font-size: 2.4rem;
    }

    p { color: var(--muted); margin: 0 0 28px; }

    .list {
      display: grid;
      gap: 14px;
    }

    .entry {
      padding: 18px 20px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 24px rgba(28, 28, 22, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .entry span { color: var(--muted); font-size: 0.95rem; }

    .nav {
      margin-top: 30px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>My Diary</h1>
    <p>Markdown entries, listed from newest to oldest.</p>

    <div class="list">
      <a class="entry" href="/20230726.md">
        <strong>2023-07-26</strong>
        <span>Entry</span>
      </a>
      <a class="entry" href="/20210708.md">
        <strong>2021-07-08</strong>
        <span>Entry</span>
      </a>
      <a class="entry" href="/20210208.md">
        <strong>2021-02-08</strong>
        <span>Entry</span>
      </a>
    </div>

    <div class="nav">
      <a class="btn" href="/">Back to Home</a>
      <a class="btn" href="/codings/">Go to Codings</a>
    </div>
  </div>
</body>
</html>
